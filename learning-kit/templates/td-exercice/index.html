<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD / Exercice</title>
    <link rel="stylesheet" href="../../layouts/sidebar-iframe.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="cursor-halo" id="cursor-halo"></div>

    <div class="app-container">
        <nav class="sidebar glass-panel">
            <div class="sidebar-header">
                <h1>Travaux Dirigés</h1>
                <p>Exercices pratiques</p>
            </div>
            <div class="nav-links" id="nav-links">
                <button class="nav-btn active" onclick="loadSection('section-EXAMPLE.html', this)">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </span> 
                    Exercice Exemple
                </button>
            </div>
        </nav>

        <main class="main-content">
            <div class="glass-panel content-wrapper">
                <iframe id="content-frame" src="section-EXAMPLE.html" frameborder="0"></iframe>
            </div>
        </main>
    </div>

    <script>
        const halo = document.getElementById('cursor-halo');
        function moveHalo(x, y) { halo.style.left = x + 'px'; halo.style.top = y + 'px'; }
        document.addEventListener('mousemove', (e) => moveHalo(e.clientX, e.clientY));
        function attachIframeHalo(frame) {
            try { frame.contentWindow.document.addEventListener('mousemove', (e) => { const r = frame.getBoundingClientRect(); moveHalo(r.left + e.clientX, r.top + e.clientY); }); } catch(e) {}
        }

        window.onload = () => {
            const savedSection = localStorage.getItem('currentSection_td');
            const buttons = document.querySelectorAll('.nav-btn');
            const firstSection = buttons.length ? buttons[0].getAttribute('onclick').match(/'([^']+)'/)?.[1] : '';
            const target = savedSection || firstSection;
            if (target) loadSection(target, null);
            if (savedSection) {
                buttons.forEach(b => { if (b.getAttribute('onclick')?.includes(savedSection)) b.classList.add('active'); });
            } else if (buttons.length) {
                buttons[0].classList.add('active');
            }
        };

        function loadSection(url, button) {
            const frame = document.getElementById('content-frame');
            frame.style.opacity = 0;
            localStorage.setItem('currentSection_td', url);
            setTimeout(() => {
                frame.src = url;
                frame.onload = () => {
                    frame.style.opacity = 1;
                    attachIframeHalo(frame);
                    const pos = localStorage.getItem('scroll_td_' + url);
                    if (pos) frame.contentWindow.scrollTo(0, parseInt(pos));
                    frame.contentWindow.addEventListener('scroll', () => {
                        localStorage.setItem('scroll_td_' + url, frame.contentWindow.scrollY);
                    });
                };
            }, 300);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (button) button.classList.add('active');
        }
    </script>
</body>
</html>
